command:
  - "uvicorn"
  - "app.main:app"
  - "--host"
  - "0.0.0.0"
  - "--port"
  - "8000"

env:
  # ── valueFrom examples (resource references - resolved by Databricks Apps runtime) ──
  # The key (e.g., "sql-warehouse") must match the resource key you assign
  # when adding the resource in the Databricks Apps UI.
  - name: DATABRICKS_WAREHOUSE_ID
    valueFrom: sql-warehouse

  # valueFrom gives the volume FQDN (e.g., "bharatbricks.iiscb.datasets")                                                                                                                       
  - name: VOLUME_FQDN                                                                                                                                                                           
    valueFrom: volume
  # ── static value examples ──
  # Subfolder within the volume where JSON files live                                                                                                                                           
  - name: VOLUME_SUBFOLDER
    value: "arxiv"        
